name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          WEBHOOK_SECRET: ${{ secrets.COOLIFY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          # Coolify's manual GitHub webhook authenticates with an HMAC-SHA256
          # signature of the raw body (X-Hub-Signature-256), keyed by the app's
          # manual_webhook_secret_github. Payload mimics a GitHub push event;
          # it must stay single-line so body and signature match byte-for-byte.
          PAYLOAD=$(jq -nc \
            --arg ref "${GITHUB_REF}" \
            --arg repo "${GITHUB_REPOSITORY}" \
            '{ref: $ref, repository: {full_name: $repo}, commits: []}')
          SIG=$(printf '%s' "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $2}')
          curl -fsSL -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -d "${PAYLOAD}"
          echo
