# E2E overlay: swaps the Moonshot API for the deterministic kimi-mock service
# and adds the e2e runner. Never applied in production — only when passed
# explicitly, ideally under a dedicated project name so the volumes stay
# disposable:
#
#   docker compose -p health-e2e -f docker-compose.yml -f docker-compose.e2e.yml \
#     run --build --rm e2e
#
# (npm run e2e wraps exactly that; npm run e2e:down tears the stack down.)
#
# Host port publishes are reset so an e2e run never collides with a dev stack
# on the same machine — everything talks over the compose network.

services:
  web:
    ports: !reset []
    environment:
      MOONSHOT_BASE_URL: http://kimi-mock:9700/v1
      MOONSHOT_API_KEY: e2e-mock
      # The e2e runner talks to the API without credentials.
      BASIC_AUTH_USER: ""
      BASIC_AUTH_PASS: ""
      # Retry options are set at SEND time, and the web service enqueues the
      # upload jobs — it needs the compressed backoff too (see worker).
      INGEST_RETRY_DELAY_S: "0"

  worker:
    environment:
      MOONSHOT_BASE_URL: http://kimi-mock:9700/v1
      MOONSHOT_API_KEY: e2e-mock
      # Zero out the pg-boss retry backoff (30s doubling in production) so
      # the outage phase's retries reschedule immediately and only cost poll
      # pickups.
      INGEST_RETRY_DELAY_S: "0"
      # Poll the ingest queue at pg-boss's 0.5s floor (default is 2s).
      INGEST_POLL_INTERVAL_S: "0.5"
      # Drain the 7-fixture upload burst in parallel instead of one document
      # per poll tick (pg-boss localConcurrency; see worker/index.mjs).
      INGEST_WORKER_CONCURRENCY: "4"

  db:
    ports: !reset []

  minio:
    ports: !reset []

  kimi-mock:
    image: node:22-alpine
    restart: "no"
    command: node /mock/scripts/kimi-mock.mjs
    environment:
      PORT: "9700"
      FIXTURES_DIR: /mock/fixtures/health-docs
    volumes:
      - ./scripts:/mock/scripts:ro
      - ./fixtures:/mock/fixtures:ro

  # The runner executes straight from bind mounts (kimi-mock pattern) — no
  # image build. It only needs scripts/, fixtures/, the seed catalog under
  # src/, and the pure-JS npm closure of e2e-pipeline.mjs + seed-biomarkers.mjs
  # (postgres, @lhncbc/ucum-lhc), served read-only from the host node_modules
  # — so `npm install` on the host is a prerequisite. Editing the runner
  # script never rebuilds anything; only web/worker still build from the
  # Dockerfile.
  e2e:
    image: node:22-alpine
    restart: "no"
    working_dir: /app
    command: node scripts/e2e-pipeline.mjs
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      bucket-init:
        condition: service_started
      web:
        condition: service_started
      worker:
        condition: service_started
      kimi-mock:
        condition: service_started
    environment:
      WEB_URL: http://web:3000
      KIMI_MOCK_URL: http://kimi-mock:9700
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-health}
      FIXTURES_DIR: /app/fixtures/health-docs
    volumes:
      - ./scripts:/app/scripts:ro
      - ./fixtures:/app/fixtures:ro
      - ./src:/app/src:ro
      - ./node_modules:/app/node_modules:ro
      # Module-resolution context (no "type" field today, but keep the
      # container faithful to how the built image resolved modules).
      - ./package.json:/app/package.json:ro
